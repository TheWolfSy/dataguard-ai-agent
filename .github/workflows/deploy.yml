name: Deploy and Version Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for production
        run: npm run build
      
      - name: Get version
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT
      
      - name: Deploy to Firebase Hosting
        uses: firebase/firebase-action@v1
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: Update version API
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Create version.json
          cat > public/api/version.json << EOF
          {
            "version": "${VERSION}",
            "releaseDate": "${TIMESTAMP}",
            "buildNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "changelog": "Auto-deployed from CI/CD"
          }
          EOF
          
          # Deploy version API
          firebase deploy --only hosting --public public
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          release_name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 30

  notify-update:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.build-and-deploy.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.build-and-deploy.result }}" >> $GITHUB_STEP_SUMMARY